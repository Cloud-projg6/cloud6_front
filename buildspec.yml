version: 0.2

env:
  variables:
    VITE_API_BASE_URL: "http://18.144.155.206:8080" #http://<백엔드EC2퍼블릭IP>:8080

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing dependencies..."
      - npm install
  
  pre_build:
    commands:
      - echo "Running linter..."
      - npm run lint --fix
  
  build:
    commands:
      - echo "Building React application..."
      - npm run build
  
  post_build:
    commands:
      - echo "Build completed"

artifacts:
  files:
    - dist/**/*
    - appspec.yml
    - deploy-scripts/**/*
  name: BookAppFrontend

cache:
  paths:
    - node_modules/**/*
