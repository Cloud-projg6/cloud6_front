version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Installing dependencies..."
      - npm install
  
  pre_build:
    commands:
      - echo "Running linter..."
      - npm run lint --fix
  
  build:
    commands:
      - echo "Building React application..."
      - npm run build
  
  post_build:
    commands:
      - echo "Build completed"

artifacts:
  files:
    - '**/*'
  base-directory: dist
  name: BookAppFrontend

cache:
  paths:
    - node_modules/**/*
